name: Desktop Release

# Triggered two ways:
#   1. push a tag matching desktop-v*  →  builds for every matrix platform
#      and uploads the artifacts to a GitHub Release of the same name.
#      Keeps this completely separate from the PyPI release flow in
#      release.yml (which is triggered by v* tags).
#   2. workflow_dispatch (manual button on the Actions tab) → builds and
#      uploads the artifacts to the workflow run only; useful for testing
#      pipeline changes without publishing.
#
# What the job actually does:
#   - Checkout the repo
#   - Install Python 3.11, Rust stable, Node (for cargo tauri icon's deps)
#   - Cache cargo to keep iteration fast on retries
#   - Install the Tauri CLI 2.x
#   - Generate platform icons from web/public/favicon.png (so we don't
#     have to commit ~6 binary blobs)
#   - Run sidecar/build_sidecar.py — pip-installs the collector +
#     pyinstaller, freezes the collector to a single per-triple binary
#   - Run `cargo tauri build` — picks up the frozen binary from
#     src-tauri/binaries/ via the externalBin declaration and bundles
#     everything into the .msi / .dmg / .AppImage
#   - Upload artifacts

on:
  push:
    tags:
      - "desktop-v*"
  workflow_dispatch:
    inputs:
      draft_release:
        description: "Create a draft release with the artifacts (true/false)"
        required: false
        default: "false"

concurrency:
  group: desktop-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            bundles: "msi nsis"
          # macOS Apple Silicon only. Intel Mac (macos-13) dropped — every
          # Mac shipped since late 2020 is arm64, runners are scarce, and
          # the .dmg almost doubled total release storage for shrinking
          # audience. Not code-signed/notarized — Gatekeeper warning
          # bypassed via right-click → Open (or `xattr -d
          # com.apple.quarantine /Applications/Memento.app`).
          - os: macos-latest
            target: aarch64-apple-darwin
            bundles: "app dmg"
          # Linux — AppImage works everywhere, .deb for Ubuntu/Debian.
          # ubuntu-22.04 pins to glibc 2.35, broadly compatible (newer
          # ubuntu-24.04 would link 2.39 and break older distros).
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            bundles: "appimage deb"

    runs-on: ${{ matrix.os }}

    permissions:
      contents: write  # so we can attach assets to a release on tag push

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Setup Rust (stable + target ${{ matrix.target }})
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust + Cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: tauri-collector/src-tauri
          # bump if cargo cache gets weirdly stuck
          prefix-key: "v1-${{ matrix.target }}"

      - name: Install Linux system deps (webkit2gtk + tray + AppImage tooling)
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libxdo-dev \
            patchelf \
            file \
            build-essential

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2.0" --locked

      - name: Generate platform icons from web favicon
        working-directory: tauri-collector/src-tauri
        run: cargo tauri icon ../../web/public/favicon.png

      - name: Build sidecars (PyInstaller frozen collector + MCP)
        working-directory: tauri-collector/sidecar
        # Force utf-8 on Windows stdout — the helper script prints `→` /
        # `✓` etc. which trip the default cp1252 codec on the Windows
        # runner. PYTHONIOENCODING is honored by every print() call.
        env:
          PYTHONIOENCODING: utf-8
          PYTHONUTF8: "1"
        run: |
          set -e
          python -m pip install --upgrade pip
          # Two frozen binaries get built:
          #   - memento-collector-sidecar : file-watcher daemon
          #   - memento-mcp-sidecar       : MCP server for AI IDEs
          # Each has its own .spec; build_sidecar.py runs PyInstaller twice.
          python -m pip install -e ../../mcp_server -e ../../collector pyinstaller
          python build_sidecar.py

      - name: Tauri build (signed)
        working-directory: tauri-collector
        # TAURI_SIGNING_PRIVATE_KEY is the contents of the minisign-format
        # ed25519 secret key generated locally (`minisign -G -p tauri.pub
        # -s tauri.key -W`). Passing it here makes `cargo tauri build`
        # write a .sig next to each installer; the auto-updater plugin
        # verifies that signature against the pubkey we ship in
        # tauri.conf.json, so an unsigned/malicious update can't be
        # installed even over compromised HTTP.
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: cargo tauri build --target ${{ matrix.target }} --bundles ${{ matrix.bundles }}

      - name: Generate latest.json (auto-update manifest)
        # Windows runner only for now: latest.json points at the NSIS .exe
        # and the embedded auto-updater on that binary picks it up. Adding
        # macOS .app.tar.gz signed update artifacts to the same manifest
        # is a follow-up — macOS users install manually for v1.
        if: startsWith(github.ref, 'refs/tags/desktop-v') && matrix.os == 'windows-latest'
        working-directory: tauri-collector/src-tauri/target/${{ matrix.target }}/release/bundle
        run: |
          set -eu
          version="${GITHUB_REF_NAME#desktop-v}"
          # Tauri's updater on Windows expects the NSIS .exe (it can
          # replace files while the app is running; MSI can't).
          exe_path=$(ls nsis/*-setup.exe | head -n1)
          sig_path="$exe_path.sig"
          if [ ! -f "$sig_path" ]; then
            echo "::error::Signature not found for $exe_path"
            exit 1
          fi
          # GitHub release asset URLs are predictable from tag + filename.
          base="https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}"
          fname=$(basename "$exe_path")
          sig_content=$(cat "$sig_path")
          pub_date=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          # Tauri 2.x manifest schema: version + per-platform { url, signature }.
          cat > latest.json <<EOF
          {
            "version": "$version",
            "notes": "See release notes at https://github.com/${GITHUB_REPOSITORY}/releases/tag/${GITHUB_REF_NAME}",
            "pub_date": "$pub_date",
            "platforms": {
              "windows-x86_64": {
                "url": "${base}/${fname}",
                "signature": $(printf '%s' "$sig_content" | python3 -c "import json,sys; print(json.dumps(sys.stdin.read()))")
              }
            }
          }
          EOF
          echo "Wrote latest.json:"
          cat latest.json

      - name: Locate built artifacts
        id: bundle
        working-directory: tauri-collector/src-tauri/target/${{ matrix.target }}/release/bundle
        run: |
          shopt -s nullglob
          echo "msi=$(ls msi/*.msi 2>/dev/null | head -n1)" >> "$GITHUB_OUTPUT"
          echo "nsis=$(ls nsis/*.exe 2>/dev/null | head -n1)" >> "$GITHUB_OUTPUT"
          echo "dmg=$(ls dmg/*.dmg 2>/dev/null | head -n1)" >> "$GITHUB_OUTPUT"
          echo "appimage=$(ls appimage/*.AppImage 2>/dev/null | head -n1)" >> "$GITHUB_OUTPUT"
          ls -R .

      - name: Upload artifacts to workflow run
        uses: actions/upload-artifact@v4
        with:
          name: memento-desktop-${{ matrix.target }}
          path: |
            tauri-collector/src-tauri/target/${{ matrix.target }}/release/bundle/msi/*.msi
            tauri-collector/src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe
            tauri-collector/src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            tauri-collector/src-tauri/target/${{ matrix.target }}/release/bundle/appimage/*.AppImage
          if-no-files-found: warn
          retention-days: 14

      - name: Create / update Release (tag push only)
        if: startsWith(github.ref, 'refs/tags/desktop-v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            tauri-collector/src-tauri/target/${{ matrix.target }}/release/bundle/latest.json
            tauri-collector/src-tauri/target/${{ matrix.target }}/release/bundle/msi/*.msi
            tauri-collector/src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe
            tauri-collector/src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe.sig
            tauri-collector/src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            tauri-collector/src-tauri/target/${{ matrix.target }}/release/bundle/appimage/*.AppImage
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          draft: false
          prerelease: false
          make_latest: "true"  # always mark desktop releases as "latest" so the
                                # updater endpoint URL (.../releases/latest/...) resolves
          fail_on_unmatched_files: false
