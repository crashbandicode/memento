apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
spec:
  replicas: 1
  selector: { matchLabels: { app: api } }
  template:
    metadata: { labels: { app: api } }
    spec:
      containers:
        - name: api
          image: ghcr.io/ddong8/memento-server:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef: { name: memento-config }
            - secretRef: { name: memento-secret }
          env:
            - name: MEMENTO_S3_ACCESS_KEY
              valueFrom: { secretKeyRef: { name: memento-secret, key: MINIO_ROOT_USER } }
            - name: MEMENTO_S3_SECRET_KEY
              valueFrom: { secretKeyRef: { name: memento-secret, key: MINIO_ROOT_PASSWORD } }
          ports:
            - containerPort: 8000
          readinessProbe:
            httpGet: { path: /health, port: 8000 }
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 12
          resources:
            requests: { cpu: 250m, memory: 512Mi }
            limits: { cpu: "2", memory: 2Gi }
---
apiVersion: v1
kind: Service
metadata:
  name: api
spec:
  selector: { app: api }
  ports:
    - port: 8000
      targetPort: 8000
