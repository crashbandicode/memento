apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: memento
spec:
  ingressClassName: traefik
  rules:
    - host: mem.ihasy.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend: { service: { name: api, port: { number: 8000 } } }
          - path: /health
            pathType: Prefix
            backend: { service: { name: api, port: { number: 8000 } } }
          - path: /docs
            pathType: Prefix
            backend: { service: { name: api, port: { number: 8000 } } }
          - path: /openapi.json
            pathType: Prefix
            backend: { service: { name: api, port: { number: 8000 } } }
          - path: /install
            pathType: Prefix
            backend: { service: { name: api, port: { number: 8000 } } }
          - path: /
            pathType: Prefix
            backend: { service: { name: web, port: { number: 3000 } } }
