name: memento

services:
  # PostgreSQL database
  postgres:
    image: pgvector/pgvector:pg16
    container_name: memento_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: memento
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    # Force-kill any transaction that sits idle in transaction > 60s.
    # Without this, a single post-ingest task that hangs holds documents row
    # locks indefinitely and starves heartbeat / login. Statement_timeout
    # caps any single query at 120s. log_lock_waits surfaces contention in
    # postgres logs early (default threshold = deadlock_timeout, ~1s).
    command: >
      postgres
      -c max_connections=200
      -c idle_in_transaction_session_timeout=60000
      -c statement_timeout=120000
      -c log_lock_waits=on
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis (for Celery broker + cache)
  redis:
    image: redis:7-alpine
    container_name: memento_redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # MinIO (S3-compatible storage for large files)
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data

  # BGE-M3 embedding server.
  #
  # Two install paths — pick ONE; they conflict on host port 8002.
  #
  # 1. Docker (default, easy):
  #      ./install.sh embedding        # builds + brings up this service
  #    or directly:
  #      docker compose --profile embedding up -d --build embedding
  #    CPU only — works the same on Mac / Linux / Win Docker Desktop.
  #    Model is baked into the image so first-start is fast; rebuild
  #    only needed when MODEL_NAME changes.
  #
  # 2. Host venv (advanced, needed for GPU):
  #      ./install.sh embedding --native
  #    Use this when you want NVIDIA CUDA or Apple Silicon MPS. The
  #    compose service stays off (no profile activated) and the API
  #    reaches the host via host.docker.internal:8002.
  embedding:
    profiles: ["embedding"]
    build:
      context: ./embedding
      dockerfile: Dockerfile
      args:
        MODEL_NAME: ${MEMENTO_EMBEDDING_MODEL_NAME:-BAAI/bge-m3}
        PIP_INDEX_URL: ${PIP_INDEX_URL:-}
    container_name: memento_embedding
    restart: unless-stopped
    expose:
      - "8002"
    # No host port mapping by default — the api/celery containers
    # reach it via docker DNS (`embedding:8002`). Uncomment the ports
    # block below if you want to hit it from the host too, but mind
    # the conflict with a native install.
    # ports:
    #   - "8002:8002"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8002/health"]
      interval: 15s
      timeout: 5s
      start_period: 60s
      retries: 4

  # FastAPI server
  api:
    build:
      context: .
      dockerfile: server/Dockerfile
      args:
        # Optional pip mirror, e.g. `.env` line
        #   PIP_INDEX_URL=https://pypi.tuna.tsinghua.edu.cn/simple
        # for users on slow PyPI links. Empty = standard pypi.org.
        PIP_INDEX_URL: ${PIP_INDEX_URL:-}
    container_name: memento_api
    # Auto-restart on OOM / crash. Previously absent, which caused a
    # production outage when api was OOM-killed (exit 137) and never
    # came back until manually restarted.
    restart: unless-stopped
    ports:
      - "8001:8000"
    environment:
      MEMENTO_DATABASE_URL: postgresql+asyncpg://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/memento
      MEMENTO_REDIS_URL: redis://redis:6379/0
      MEMENTO_PORT: "8000"
      MEMENTO_S3_ENDPOINT: http://minio:9000
      MEMENTO_S3_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MEMENTO_S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MEMENTO_COLLECTOR_TOKEN: ${MEMENTO_COLLECTOR_TOKEN:-collector-dev-token}
      MEMENTO_SECRET_KEY: ${MEMENTO_SECRET_KEY:-change-me-in-production}
      MEMENTO_ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      MEMENTO_AI_BASE_URL: ${MEMENTO_AI_BASE_URL:-https://coding.dashscope.aliyuncs.com/v1}
      MEMENTO_AI_API_KEY: ${MEMENTO_AI_API_KEY:-}
      MEMENTO_AI_MODEL: ${MEMENTO_AI_MODEL:-kimi-k2.5}
      MEMENTO_INGEST_SPOOL_DIR: /data/ingest-spool
      # Default points at the in-compose embedding container (`embedding`
      # service, activated via `--profile embedding`). Users running the
      # native host install override this in .env to
      # `http://host.docker.internal:8002`.
      MEMENTO_EMBEDDING_SERVER_URL: ${MEMENTO_EMBEDDING_SERVER_URL:-http://embedding:8002}
      MEMENTO_GEOIP_DB: /data/geoip/GeoLite2-City.mmdb
    # Linux Docker (non-Docker-Desktop) doesn't auto-resolve
    # host.docker.internal — embedding server runs on the host at :8002,
    # so the container needs an explicit mapping to the bridge gateway.
    # Docker Desktop adds this automatically; this entry is a no-op there.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      # GeoIP database for share-link visitor location. Host dir is created
      # on-demand by scripts/download_geoip.sh; mount is optional — service
      # gracefully degrades to "country/city unknown" if missing.
      - ./server/data/geoip:/data/geoip:ro
      # Durable handoff for chunked uploads. The API only stages chunks here;
      # the dedicated ingest worker below assembles and ingests ready jobs.
      - ingest_spool:/data/ingest-spool
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started

  # Celery worker (async tasks: AI summaries)
  celery-worker:
    build:
      context: .
      dockerfile: server/Dockerfile
      args:
        PIP_INDEX_URL: ${PIP_INDEX_URL:-}
    restart: unless-stopped
    # Embedding admission is serialized and most background work is I/O-bound;
    # a large prefork pool only multiplies Python heaps and busy retries. Two
    # workers preserve useful overlap while keeping workstation memory stable.
    command: >
      celery -A server.tasks.celery_app worker
      --loglevel=info
      --concurrency=${MEMENTO_CELERY_CONCURRENCY:-2}
      --prefetch-multiplier=1
      --max-tasks-per-child=25
    environment:
      MEMENTO_DATABASE_URL: postgresql+asyncpg://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/memento
      MEMENTO_REDIS_URL: redis://redis:6379/0
      # MinIO/S3 needed for daily db_backup task
      MEMENTO_S3_ENDPOINT: http://minio:9000
      MEMENTO_S3_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MEMENTO_S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MEMENTO_ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      MEMENTO_AI_API_KEY: ${MEMENTO_AI_API_KEY:-}
      MEMENTO_AI_BASE_URL: ${MEMENTO_AI_BASE_URL:-https://coding.dashscope.aliyuncs.com/v1}
      MEMENTO_AI_MODEL: ${MEMENTO_AI_MODEL:-kimi-k2.5}
      MEMENTO_EMBEDDING_SERVER_URL: ${MEMENTO_EMBEDDING_SERVER_URL:-http://embedding:8002}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # Dedicated, serialized finalizer for durable chunked uploads. Keeping this
  # on its own queue prevents multi-hundred-megabyte transcript parsing from
  # competing with summaries, embeddings, backups, or scheduled maintenance.
  celery-ingest-worker:
    build:
      context: .
      dockerfile: server/Dockerfile
      args:
        PIP_INDEX_URL: ${PIP_INDEX_URL:-}
    container_name: memento_celery_ingest_worker
    restart: unless-stopped
    command: >
      celery -A server.tasks.celery_app worker
      --loglevel=info
      --queues=ingest
      --concurrency=1
      --prefetch-multiplier=1
      --max-tasks-per-child=1
    environment:
      MEMENTO_DATABASE_URL: postgresql+asyncpg://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/memento
      MEMENTO_REDIS_URL: redis://redis:6379/0
      MEMENTO_S3_ENDPOINT: http://minio:9000
      MEMENTO_S3_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MEMENTO_S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MEMENTO_S3_BUCKET: ${MEMENTO_S3_BUCKET:-memento}
      MEMENTO_ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      MEMENTO_AI_API_KEY: ${MEMENTO_AI_API_KEY:-}
      MEMENTO_AI_BASE_URL: ${MEMENTO_AI_BASE_URL:-https://coding.dashscope.aliyuncs.com/v1}
      MEMENTO_AI_MODEL: ${MEMENTO_AI_MODEL:-kimi-k2.5}
      MEMENTO_EMBEDDING_SERVER_URL: ${MEMENTO_EMBEDDING_SERVER_URL:-http://embedding:8002}
      MEMENTO_INGEST_SPOOL_DIR: /data/ingest-spool
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ingest_spool:/data/ingest-spool
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started

  # Celery beat (scheduled tasks: daily digest)
  celery-beat:
    build:
      context: .
      dockerfile: server/Dockerfile
      args:
        PIP_INDEX_URL: ${PIP_INDEX_URL:-}
    restart: unless-stopped
    command: celery -A server.tasks.celery_app beat --loglevel=info
    environment:
      MEMENTO_REDIS_URL: redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy

  # Next.js frontend
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: memento_web
    restart: unless-stopped
    ports:
      - "3001:3000"
    depends_on:
      - api

volumes:
  pgdata:
  miniodata:
  ingest_spool:
